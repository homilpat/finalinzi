<!DOCTYPE html><html class="h-full" lang="ko"><head>

<style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .active-scale:active { transform: scale(0.95); transition: transform 0.1s; }
        .celebration-gradient { background: linear-gradient(90deg, #4A90E2 0%, #7FD8C2 100%); }
        .soft-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .tree-bounce { animation: bounce 3s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        /* Adjusted for scrolling since content is larger */
        .scrolling-container { height: 100vh; height: 100svh; overflow-y: auto; }
    </style>
</head>
<body class="bg-background text-on-surface scrolling-container flex flex-col pb-32">
<!-- Top Celebration Zone -->
<section class="celebration-gradient rounded-b-[40px] flex flex-col items-center justify-center text-white relative z-10 flex-none py-10 px-6">
<div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-4 shadow-xl">
<span class="material-symbols-outlined text-[48px] text-[#7FD8C2] font-bold" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<h1 class="font-bold text-[44px] leading-tight mb-2 text-center">운동 완료! 🎉</h1>
<p class="text-[26px] font-medium opacity-95 text-center">김순자 어르신 정말 잘 하셨어요!</p>
</section>

<span>📅</span> 출석

<div class="flex flex-col items-end">

</div>
</div>

<div class="w-10 h-10 rounded-full border-2 border-outline-variant"></div>
</div>
<div class="flex flex-col items-center gap-2">
<span class="text-[22px] text-primary font-bold">월</span>
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-[24px] text-secondary font-bold">check</span>
</div>
</div>
<div class="flex flex-col items-center gap-2">
<span class="text-[22px] text-outline">화</span>
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-[24px] text-secondary font-bold">check</span>
</div>
</div>
<div class="flex flex-col items-center gap-2">
<span class="text-[22px] text-outline">수</span>
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-[24px] text-secondary font-bold">check</span>
</div>
</div>
<div class="flex flex-col items-center gap-2">
<span class="text-[22px] text-outline">목</span>
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-[24px] text-secondary font-bold">check</span>
</div>
</div>
<div class="flex flex-col items-center gap-2">
<span class="text-[22px] text-outline font-bold">금</span>
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center shadow-sm">
<span class="text-[20px]">🔥</span>
</div>
</div>
<div class="flex flex-col items-center gap-2">
<span class="text-[22px] text-outline">토</span>
<div class="w-10 h-10 rounded-full border-2 border-outline-variant"></div>
</div>
</div>
</div>
<div class="mt-4 grid grid-cols-3 divide-x-2 divide-outline-variant text-center border-t-2 border-outline-variant pt-4">
<div>

<p class="font-bold text-[28px]">16일</p>
</div>
<div>
<p class="text-[20px] text-outline font-medium">결석</p>
<p class="font-bold text-[28px]">3일</p>
</div>
<div>
<p class="text-[20px] text-outline font-medium">최장</p>
<p class="font-bold text-[28px]">4일</p>
</div>
</div>
</div>
<!-- Growth Status Section -->
<div class="bg-white rounded-[32px] p-6 soft-shadow flex flex-col">
<h2 class="w-full text-left font-bold text-[32px] text-[#243B53] mb-4 flex items-center gap-2">
<span>🌳</span> 성장 현황
            </h2>
<div class="flex items-center gap-6">

</div>
<div class="flex-1 flex flex-col justify-center">
<div class="flex flex-col mb-2">
<p class="font-bold text-[26px] text-on-surface">건강 나무 Lv.3</p>
<div class="bg-error-container/20 px-3 py-1 rounded-full w-fit mt-1">
<span class="font-bold text-[18px] text-tertiary">신체나이 7살 젊어요! 💪</span>
</div>

<div class="w-full h-4 bg-surface-container-highest rounded-full overflow-hidden my-2">

</div>

</div>
</div>

<!-- Achievement Cards -->
<div class="grid grid-cols-3 gap-3">
<div class="bg-white rounded-[20px] soft-shadow p-3 flex flex-col items-center justify-center gap-1 border-l-[6px] border-primary h-36">
<span class="text-[32px]">🏃</span>
<div class="text-center">
<span class="font-bold text-[32px] block leading-tight">12분</span>
<span class="text-[20px] text-outline font-bold">운동</span>
</div>
</div>
<div class="bg-white rounded-[20px] soft-shadow p-3 flex flex-col items-center justify-center gap-1 border-l-[6px] border-secondary h-36">

<div class="text-center">
<span class="font-bold text-[32px] block leading-tight">88점</span>

</div>
</div>
<div class="bg-white rounded-[20px] soft-shadow p-3 flex flex-col items-center justify-center gap-1 border-l-[6px] border-tertiary h-36">

<div class="text-center">
<span class="font-bold text-[32px] block leading-tight">75점</span>
<span class="text-[20px] text-outline font-bold">보행</span>
</div>
</div>
</div>
<!-- Bottom Action Button -->
<div class="mt-4 mb-4">
<button class="w-full h-24 bg-primary rounded-[24px] active-scale flex items-center justify-center gap-4 shadow-xl hover:brightness-110 transition-all">
<span class="material-symbols-outlined text-white text-[44px]">bar_chart</span>
<span class="font-black text-white text-[34px]">상세 리포트 보기</span>
</button>

<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-white/95 backdrop-blur-md rounded-t-[40px] shadow-[0_-8px_30px_rgba(0,0,0,0.1)] h-[110px]">
<div class="flex flex-col items-center justify-center text-on-surface-variant px-4 opacity-50">
<span class="material-symbols-outlined text-[36px]">home</span>
<span class="text-[18px] font-bold">홈</span>
</div>
<div class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-[24px] px-10 py-3 shadow-lg">
<span class="material-symbols-outlined text-[36px]">edit_square</span>
<span class="text-[20px] font-bold">기록</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant px-4 opacity-50">
<span class="material-symbols-outlined text-[36px]">bar_chart</span>
<span class="text-[18px] font-bold">통계</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant px-4 opacity-50">
<span class="material-symbols-outlined text-[36px]">person</span>
<span class="text-[18px] font-bold">내 정보</span>
</div>
</nav>
<script>
        const reportBtn = document.querySelector('button');
        if(reportBtn) {
            reportBtn.addEventListener('click', function() {
                this.classList.add('scale-95');
                setTimeout(() => this.classList.remove('scale-95'), 100);
            });
        }
    </script>
</body></html>
