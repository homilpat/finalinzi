<script>
        // Simple entry animation for progress bars
        window.addEventListener('DOMContentLoaded', () => {
            const bars = document.querySelectorAll('.h-full.transition-all');
            bars.forEach(bar => {
                const finalWidth = bar.style.width;
                bar.style.width = '0%';
                setTimeout(() => {
                    bar.style.width = finalWidth;
                }, 300);
            });
        });
    </script>
