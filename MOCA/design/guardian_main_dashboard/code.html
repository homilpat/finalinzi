<style>
        body {
            background-color: #F7FAFC;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .card-shadow {
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .chart-container {
            position: relative;
            height: 120px;
            width: 100%;
        }
        .chart-line {
            stroke: #005da7;
            stroke-width: 4;
            fill: none;
        }
        .chart-area {
            fill: url(#chartGradient);
            opacity: 0.2;
        }
    </style>

<body class="flex items-center justify-center min-h-screen bg-slate-200">
<!-- Mobile Frame (390x844) -->
<div class="relative w-[390px] h-[844px] bg-[#F7FAFC] overflow-hidden shadow-2xl flex flex-col font-body-md">
<!-- TopAppBar (From JSON mapping) -->
<header class="flex justify-between items-center px-container-padding h-touch-target-min w-full bg-surface z-20">
<div class="flex flex-col">
<h1 class="font-headline-md text-[24px] leading-tight font-bold text-primary">안녕하세요, 김지영님 👋</h1>
<p class="text-on-surface-variant font-label-md text-[16px]">어머니 현황을 확인해보세요</p>
</div>
<div class="relative w-12 h-12 flex items-center justify-center transition-transform active:scale-95 duration-200">
<span class="material-symbols-outlined text-[32px] text-on-surface-variant">notifications</span>
<span class="absolute top-2 right-2 w-5 h-5 bg-error text-white text-[10px] flex items-center justify-center rounded-full border-2 border-surface font-bold">2</span>
</div>
</header>
<!-- Scrollable Content -->
<main class="flex-1 overflow-y-auto px-container-padding pb-safe-zone-bottom space-y-6 hide-scrollbar">
<!-- Parent Info Hero Card -->
<section class="bg-white rounded-[28px] p-6 card-shadow mt-4">
<div class="flex items-center gap-4 mb-6">
<div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center text-white text-[28px] font-bold">
                        김
                    </div>
<div>
<h2 class="text-on-surface font-headline-md text-[24px] leading-tight">김순자 어르신</h2>
<p class="text-on-surface-variant font-body-md text-[18px]">1950년생 · 75세</p>
</div>
</div>
<div class="grid grid-cols-2 gap-3">
<div class="bg-surface-container rounded-2xl p-4 flex flex-col justify-center">
<span class="text-on-surface-variant text-[14px]">오늘 운동</span>
<span class="text-primary font-bold text-[18px]">✅ 완료</span>
</div>
<div class="bg-primary-fixed rounded-2xl p-4 flex flex-col justify-center border border-primary/10">
<span class="text-on-surface-variant text-[14px]">건강점수</span>
<span class="text-primary font-bold text-[18px]">82점 <span class="text-[14px] font-medium">▲+7</span></span>
</div>
</div>
</section>
<!-- Tab Bar -->
<nav class="flex space-x-2 bg-surface-container-low p-1.5 rounded-2xl">
<button class="flex-1 py-3 px-2 bg-white rounded-xl shadow-sm text-primary font-bold text-[16px] transition-all">📊 요약</button>
<button class="flex-1 py-3 px-2 text-on-surface-variant font-medium text-[16px] hover:bg-surface-container transition-all">📅 출석</button>
<button class="flex-1 py-3 px-2 text-on-surface-variant font-medium text-[16px] hover:bg-surface-container transition-all">📋 검사결과</button>
</nav>
<!-- Stats Grid -->
<section class="grid grid-cols-3 gap-3">
<div class="bg-white p-4 rounded-[20px] card-shadow flex flex-col items-center text-center">
<span class="text-on-surface-variant text-[12px] mb-1">종합점수</span>
<span class="font-bold text-primary text-[20px]">82점</span>
<div class="flex text-tertiary-container scale-75 -my-1">
<span class="material-symbols-outlined filled-icon text-[16px]">star</span>
<span class="material-symbols-outlined filled-icon text-[16px]">star</span>
<span class="material-symbols-outlined filled-icon text-[16px]">star</span>
<span class="material-symbols-outlined filled-icon text-[16px]">star</span>
<span class="material-symbols-outlined text-[16px]">star</span>
</div>
<span class="text-primary text-[10px] mt-1 font-medium">▲ 지난주 +7</span>
</div>
<div class="bg-white p-4 rounded-[20px] card-shadow flex flex-col items-center">
<span class="text-on-surface-variant text-[12px] mb-1">이번 달</span>
<span class="font-bold text-secondary text-[20px]">14회</span>

</div>

</div>

<div class="w-full mt-2 flex justify-center space-x-1">
<div class="w-1.5 h-1.5 rounded-full bg-tertiary"></div>
<div class="w-1.5 h-1.5 rounded-full bg-tertiary"></div>
<div class="w-1.5 h-1.5 rounded-full bg-tertiary"></div>
<div class="w-1.5 h-1.5 rounded-full bg-tertiary"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant"></div>
</div>
</div>
</section>
<!-- Weekly Trend Card -->
<section class="bg-white rounded-[28px] p-6 card-shadow relative overflow-hidden">
<div class="flex justify-between items-center mb-4">

</div>
<div class="chart-container mt-6">
<svg class="w-full h-full preserve-3d" viewBox="0 0 100 40">
<defs>
<linearGradient id="chartGradient" x1="0" x2="0" y1="0" y2="1">
<stop offset="0%" stop-color="#006b5a" stop-opacity="0.4"></stop>
<stop offset="100%" stop-color="#006b5a" stop-opacity="0"></stop>
</linearGradient>
</defs>
<!-- Chart Area Fill -->
<path class="chart-area" d="M0,40 L0,30 L16.6,25 L33.2,32 L49.8,20 L66.4,18 L83,12 L100,5 L100,40 Z"></path>

<path d="M0,30 L16.6,25 L33.2,32 L49.8,20 L66.4,18 L83,12 L100,5" fill="none" stroke="#005da7" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>

<circle cx="0" cy="30" fill="#005da7" r="1.2"></circle>

<div class="flex justify-between mt-2 px-1">

<!-- Bottom Action Row -->
<section class="grid grid-cols-2 gap-4">

<h4 class="font-bold text-[16px] mb-3 text-on-surface">운동 기록</h4>

<span class="w-1.5 h-1.5 rounded-full bg-secondary"></span>

</li>
<li class="flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-outline-variant"></span>
<span class="text-[14px] text-on-surface-variant">어제 14:15</span>
</li>
<li class="flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-outline-variant"></span>
<span class="text-[14px] text-on-surface-variant">2일전 09:40</span>
</li>
</ul>
</div>
<div class="bg-primary p-5 rounded-[28px] card-shadow flex flex-col justify-between transition-all active:scale-95">
<p class="text-white font-bold text-[16px] leading-tight">어머니에게<br>힘을 주세요!</p>
<button class="mt-4 w-full bg-white text-primary font-bold py-3 rounded-2xl flex items-center justify-center gap-1 shadow-md">
<span class="text-[14px]">응원하기</span>
<span class="material-symbols-outlined text-[18px] filled-icon">favorite</span>
</button>
</div>
</section>
</main>
<!-- BottomNavBar (From JSON mapping) -->
<nav class="fixed bottom-0 left-0 w-full h-safe-zone-bottom bg-surface-container-lowest flex justify-around items-center px-4 pb-4 shadow-[0_-4px_20px_rgba(0,0,0,0.10)] z-50 rounded-t-xl">
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-6 py-2 transition-all active:scale-90 duration-300">
<span class="material-symbols-outlined text-[28px] filled-icon">home</span>
<span class="font-label-md text-[14px] mt-0.5">홈</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-6 py-2 transition-all active:scale-90 duration-300">
<span class="material-symbols-outlined text-[28px]">analytics</span>
<span class="font-label-md text-[14px] mt-0.5">보고서</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-6 py-2 transition-all active:scale-90 duration-300">
<span class="material-symbols-outlined text-[28px]">calendar_today</span>

</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-6 py-2 transition-all active:scale-90 duration-300">

<span class="font-label-md text-[14px] mt-0.5">설정</span>
</button>

</div>
<!-- Interaction Script -->
<script>
        // Simple haptic-like feedback on buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', function() {
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(10);
                }
            });
        });

        // Toggle badge visibility for demo
        const notificationBtn = document.querySelector('header .relative');
        notificationBtn.addEventListener('click', () => {
            const badge = notificationBtn.querySelector('.bg-error');
            if(badge) badge.style.display = 'none';
        });
    </script>
</body></html>
