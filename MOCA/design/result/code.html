<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>분석 완료 - 두근두근</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-tap-highlight-color: transparent;
            width: 390px;
            height: 844px;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
            background-color: #f8f9ff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .safe-top { height: 44px; }
        .header-height { height: 48px; }
        .nav-height { height: 80px; }
        .home-indicator { height: 34px; }
        .content-height { height: 638px; }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#005da7",
                        "on-primary": "#ffffff",
                        "secondary": "#006b5a",
                        "on-secondary": "#ffffff",
                        "background": "#f8f9ff",
                        "surface": "#f8f9ff",
                        "surface-variant": "#d0e4ff",
                        "surface-container": "#e4efff",
                        "surface-container-low": "#eef4ff",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#021d33",
                        "on-surface-variant": "#414751",
                        "outline": "#717783",
                        "primary-container": "#2976c7",
                        "secondary-container": "#97f0da",
                        "on-primary-container": "#fdfcff"
                    },
                    "spacing": {
                        "iphone-side": "20px"
                    }
                },
            },
        }
    </script>
</head>
<body class="flex flex-col">
<!-- Status Bar Spacer -->
<div class="safe-top w-full flex-shrink-0"></div>
<!-- Header (48px) -->
<header class="header-height w-full px-iphone-side flex items-center justify-between flex-shrink-0">
<button aria-label="뒤로 가기" class="flex items-center justify-center h-10 px-2 rounded-lg border-2 border-primary/10">
<span class="material-symbols-outlined text-primary text-[28px]">arrow_back</span>
<span class="ml-1 text-[18px] font-bold text-primary">뒤로</span>
</button>
<h1 class="text-[24px] font-black text-primary">두근두근</h1>
<div class="w-[68px]"></div> <!-- Spacer to center title -->
</header>
<!-- Main Content Area (638px) -->
<main class="content-height flex flex-col flex-shrink-0 overflow-hidden">
<!-- Hero Section -->
<section class="w-full bg-gradient-to-r from-secondary-container to-primary-container px-iphone-side py-3 flex flex-col items-center flex-shrink-0">
<h2 class="text-[26px] font-black text-on-primary-container">분석 완료!</h2>
</section>
<!-- Result Content Container -->
<div class="px-iphone-side flex-grow flex flex-col justify-between py-4 overflow-hidden">
<!-- Result Card -->
<article class="bg-surface-container-lowest rounded-[24px] shadow-lg border-2 border-primary/10 p-5 flex-shrink-0">
<p class="text-[18px] font-bold text-on-surface-variant mb-1">어르신 건강 유형</p>
<div class="grid grid-cols-2 gap-3 mb-3">
<div class="flex items-center justify-center p-3 rounded-xl border border-gray-200 bg-surface-container-low">
<span class="text-[22px] font-bold text-outline">A 유형</span>
</div>
<div class="flex items-center justify-center p-3 rounded-xl border border-gray-200 bg-surface-container-low">
<span class="text-[22px] font-bold text-outline">B 유형</span>
</div>
<div class="flex items-center justify-center p-4 rounded-xl border-2 border-primary bg-primary/5 shadow-md">
<span class="text-[28px] font-black text-primary">C 유형</span>
</div>
<div class="flex items-center justify-center p-3 rounded-xl border border-gray-200 bg-surface-container-low">
<span class="text-[22px] font-bold text-outline">D 유형</span>
</div>
</div>
<div class="bg-surface-container rounded-xl p-2">
<p class="text-[22px] text-on-surface leading-snug">
                        보행 시 안정감을 높이기 위한 하체 근력 강화가 필요합니다.
                    </p>
</div>
</article>
<!-- Metrics -->
<div class="space-y-3 flex-grow flex flex-col justify-center">
<!-- Cognitive -->
<div class="bg-surface-container-low rounded-2xl border border-primary/10 p-4">
<div class="flex justify-between items-center mb-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[32px]">psychology</span>
<span class="text-[20px] font-bold">인지 기능</span>
</div>
<span class="text-[32px] font-black text-primary">60점</span>
</div>
<div class="w-full bg-surface-variant rounded-full h-6">
<div class="h-full bg-primary rounded-full" style="width: 60%"></div>
</div>
</div>
<!-- Walking -->
<div class="bg-surface-container-low rounded-2xl border border-secondary/10 p-4">
<div class="flex justify-between items-center mb-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary text-[32px]">directions_walk</span>
<span class="text-[20px] font-bold">보행 기능</span>
</div>
<span class="text-[32px] font-black text-secondary">75점</span>
</div>
<div class="w-full bg-surface-variant rounded-full h-6">
<div class="h-full bg-secondary rounded-full" style="width: 75%"></div>
</div>
</div>
</div>
<!-- Action Button (80px height optimized) -->
<button class="w-full h-20 bg-primary text-on-primary rounded-[20px] text-[26px] font-black flex items-center justify-center gap-3 shadow-xl active:scale-[0.98] transition-transform flex-shrink-0">
                운동 시작하기
                <span class="material-symbols-outlined text-[36px]">arrow_forward</span>
</button>
</div>
</main>
<!-- Bottom Navigation (80px) -->
<nav class="nav-height w-full flex justify-around items-center px-4 bg-white border-t border-gray-200 flex-shrink-0">
<a class="flex flex-col items-center text-on-surface-variant" href="#">
<span class="material-symbols-outlined text-[32px]">home</span>
<span class="text-[14px] font-bold">홈</span>
</a>
<a class="flex flex-col items-center bg-primary text-on-primary rounded-2xl px-5 py-2" href="#">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">monitor_heart</span>
<span class="text-[14px] font-bold">건강기록</span>
</a>
<a class="flex flex-col items-center text-on-surface-variant" href="#">
<span class="material-symbols-outlined text-[32px]">notifications</span>
<span class="text-[14px] font-bold">알림</span>
</a>
<a class="flex flex-col items-center text-on-surface-variant" href="#">
<span class="material-symbols-outlined text-[32px]">person</span>
<span class="text-[14px] font-bold">내 정보</span>
</a>
</nav>
<!-- Home Indicator Spacer (34px) -->
<div class="home-indicator w-full flex-shrink-0"></div>
</body></html>
