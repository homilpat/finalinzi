<script>
        // Simple micro-interaction for the start button
        document.querySelector('button.bg-primary').addEventListener('click', function() {
            this.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> 준비 중...';
            setTimeout(() => {
                this.innerHTML = '<span class="material-symbols-outlined fill-icon text-[40px]">play_arrow</span> 운동 시작하기';
            }, 1000);
        });
