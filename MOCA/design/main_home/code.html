<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed-dim": "#7ed7c1",
                    "secondary": "#006b5a",
                    "primary": "#005da7",
                    "error": "#ba1a1a",
                    "tertiary-container": "#b85846",
                    "on-tertiary-fixed-variant": "#7d2c1e",
                    "primary-fixed": "#d4e3ff",
                    "on-surface-variant": "#414751",
                    "on-secondary": "#ffffff",
                    "on-primary": "#ffffff",
                    "surface-tint": "#0060ac",
                    "outline": "#717783",
                    "on-secondary-fixed-variant": "#005143",
                    "tertiary-fixed-dim": "#ffb4a6",
                    "secondary-container": "#97f0da",
                    "primary-container": "#2976c7",
                    "surface-container-highest": "#d0e4ff",
                    "on-primary-fixed": "#001c39",
                    "primary-fixed-dim": "#a4c9ff",
                    "surface-variant": "#d0e4ff",
                    "secondary-fixed": "#9af3dc",
                    "on-primary-container": "#fdfcff",
                    "on-surface": "#021d33",
                    "on-error": "#ffffff",
                    "inverse-primary": "#a4c9ff",
                    "on-tertiary-container": "#fffbff",
                    "on-error-container": "#93000a",
                    "surface-container-high": "#dae9ff",
                    "surface-container-low": "#eef4ff",
                    "on-secondary-fixed": "#00201a",
                    "on-secondary-container": "#00705e",
                    "tertiary-fixed": "#ffdad3",
                    "tertiary": "#994030",
                    "surface-bright": "#f8f9ff",
                    "background": "#f8f9ff",
                    "surface-container": "#e4efff",
                    "on-primary-fixed-variant": "#004883",
                    "inverse-on-surface": "#e9f1ff",
                    "on-tertiary": "#ffffff",
                    "surface": "#f8f9ff",
                    "on-background": "#021d33",
                    "error-container": "#ffdad6",
                    "on-tertiary-fixed": "#3f0300",
                    "surface-dim": "#c5dcfb",
                    "inverse-surface": "#1a324a",
                    "surface-container-lowest": "#ffffff",
                    "outline-variant": "#c1c7d3"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "button-height-min": "80px",
                    "touch-target-min": "72px",
                    "safe-zone-bottom": "114px",
                    "container-padding": "20px",
                    "stack-gap": "16px",
                    "back-button-tap": "52px"
            },
            "fontFamily": {
                    "body-lg": ["Noto Sans KR"],
                    "label-md": ["Noto Sans KR"],
                    "headline-lg": ["Noto Sans KR"],
                    "body-md": ["Noto Sans KR"],
                    "headline-md": ["Noto Sans KR"]
            },
            "fontSize": {
                    "body-lg": ["28px", {"lineHeight": "40px", "fontWeight": "500"}],
                    "label-md": ["20px", {"lineHeight": "28px", "letterSpacing": "0.02em", "fontWeight": "700"}],
                    "headline-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["24px", {"lineHeight": "32px", "fontWeight": "400"}],
                    "headline-md": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8f9ff;
            -webkit-tap-highlight-color: transparent;
            font-size: 22px;
            overflow: hidden;
        }
        .header-gradient {
            background: linear-gradient(135deg, #4A90E2 0%, #7FD8C2 100%);
        }
        .main-container {
            width: 390px;
            height: 844px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-color: #f8f9ff;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 48;
        }
        .active-press:active {
            transform: scale(0.97);
            filter: brightness(0.95);
        }
        /* Top Offset: 44px (status bar) + 48px (header content) = 92px managed by padding/height */
        .status-bar-spacer { height: 44px; }
    </style>
</head>
<body class="bg-surface">
<main class="main-container shadow-2xl">
<!-- TOP HEADER SECTION -->
<header class="header-gradient px-container-padding relative overflow-hidden rounded-b-[32px] shrink-0">
<div class="status-bar-spacer w-full"></div>
<div class="absolute -top-10 -right-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
<div class="flex justify-between items-center h-[48px] z-10">
<h1 class="text-[22px] font-bold text-white tracking-tight">두근두근</h1>
<button class="w-[44px] h-[44px] flex items-center justify-center bg-white/20 rounded-full active-press">
<span class="material-symbols-outlined text-white text-[28px]" data-icon="notifications">notifications</span>
</button>
</div>
<div class="z-10 flex flex-col pt-2 pb-10">
<span class="text-[44px] leading-none mb-1">👋</span>
<h2 class="text-[36px] font-black text-white leading-tight">김순자 어르신</h2>
<p class="text-[22px] text-white/95 font-bold leading-tight">오늘도 운동하러 오셨네요!</p>
<div class="mt-4">
<div class="bg-white/95 w-fit px-5 py-2 rounded-full flex items-center gap-2 shadow-sm">
<span class="text-[20px] font-black text-[#243B53]">🔥 3일 연속 출석 중!</span>
</div>
</div>
</div>
</header>
<!-- HEALTH SCORE CARD -->
<section class="px-container-padding -mt-6 z-20 shrink-0">
<div class="glass-card rounded-[24px] flex items-center p-5 gap-4">
<div class="flex-1">
<p class="text-[18px] font-bold text-on-surface-variant mb-1">건강점수</p>
<div class="flex flex-col">
<span class="text-[38px] font-black text-[#4A90E2] leading-none">82점</span>
<span class="text-[18px] text-amber-500 mt-1">★★★★☆</span>
</div>
</div>
<div class="w-[1px] h-16 bg-outline-variant/50"></div>
<div class="flex-1">
<p class="text-[18px] font-bold text-on-surface-variant mb-1">오늘 미션</p>
<div class="flex flex-col">
<p class="text-[22px] font-black text-[#243B53] leading-tight mb-1">걷기+게임</p>
<span class="inline-flex w-fit bg-secondary-container text-[#006b5a] px-3 py-0.5 rounded-full text-[16px] font-black">15분</span>
</div>
</div>
</div>
</section>
<!-- MAIN BUTTON SECTION -->
<section class="flex-grow px-container-padding py-4 flex flex-col justify-center space-y-4">
<!-- PRIMARY BUTTON -->
<button class="w-full h-[120px] bg-[#4A90E2] rounded-[28px] shadow-lg shadow-[#4A90E2]/20 flex items-center p-5 gap-5 text-left active-press group">
<div class="shrink-0 w-[70px] h-[70px] bg-white/25 rounded-full flex items-center justify-center">
<span class="text-[44px]">🏃</span>
</div>
<div class="flex flex-col">
<span class="text-[32px] font-black text-white leading-tight">운동하러 가기</span>
<span class="text-[18px] text-white/90 font-medium">맞춤 운동 시작하기</span>
</div>
</button>
<!-- SECONDARY BUTTONS ROW -->
<div class="grid grid-cols-2 gap-4 h-[110px]">
<!-- Left Button -->
<button class="bg-white border-[3px] border-[#7FD8C2] rounded-[24px] flex flex-col items-center justify-center p-2 shadow-sm active-press group">
<span class="text-[36px] mb-1">📊</span>
<span class="text-[22px] font-black text-[#243B53] leading-tight">기록 보기</span>
</button>
<!-- Right Button -->
<button class="bg-white border-[3px] border-[#FF8F7A] rounded-[24px] flex flex-col items-center justify-center p-2 shadow-sm active-press group">
<span class="text-[36px] mb-1">🔄</span>
<span class="text-[22px] font-black text-[#243B53] leading-tight">다시 검사</span>
</button>
</div>
</section>
<!-- BOTTOM NAVIGATION -->
<!-- height 80px + 34px (home indicator) = 114px bottom offset -->
<nav class="shrink-0 w-full bg-white border-t border-outline-variant/20 px-2 pt-2 pb-[34px] flex justify-around items-center z-50 h-[114px]">
<!-- Home (Active) -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-2xl w-[100px] h-[64px] active:brightness-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="text-[18px] font-black">홈</span>
</a>
<!-- Records -->
<a class="flex flex-col items-center justify-center text-on-surface-variant w-[100px] h-[64px] active:brightness-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined text-[32px]">favorite</span>
<span class="text-[18px] font-black">기록</span>
</a>
<!-- Settings -->
<a class="flex flex-col items-center justify-center text-on-surface-variant w-[100px] h-[64px] active:brightness-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined text-[32px]">settings</span>
<span class="text-[18px] font-black">설정</span>
</a>
</nav>
</main>
<script>
        document.querySelectorAll('button, a').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                if ('vibrate' in navigator) {
                    navigator.vibrate(15);
                }
            });
        });
    </script>
</body></html>
