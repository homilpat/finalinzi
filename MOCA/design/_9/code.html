<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-surface": "#1a324a",
                    "on-tertiary-fixed-variant": "#7d2c1e",
                    "on-primary-fixed": "#001c39",
                    "on-tertiary-container": "#fffbff",
                    "error-container": "#ffdad6",
                    "tertiary": "#994030",
                    "primary": "#005da7",
                    "on-primary-fixed-variant": "#004883",
                    "on-secondary-fixed": "#00201a",
                    "surface-variant": "#d0e4ff",
                    "on-error-container": "#93000a",
                    "surface-tint": "#0060ac",
                    "primary-fixed-dim": "#a4c9ff",
                    "on-secondary-container": "#00705e",
                    "tertiary-fixed-dim": "#ffb4a6",
                    "secondary-fixed": "#9af3dc",
                    "on-surface-variant": "#414751",
                    "on-background": "#021d33",
                    "tertiary-fixed": "#ffdad3",
                    "surface-container-highest": "#d0e4ff",
                    "on-primary-container": "#fdfcff",
                    "background": "#f8f9ff",
                    "secondary-fixed-dim": "#7ed7c1",
                    "primary-fixed": "#d4e3ff",
                    "error": "#ba1a1a",
                    "surface-bright": "#f8f9ff",
                    "surface-container-lowest": "#ffffff",
                    "surface-container": "#e4efff",
                    "on-surface": "#021d33",
                    "on-secondary": "#ffffff",
                    "tertiary-container": "#b85846",
                    "on-tertiary-fixed": "#3f0300",
                    "inverse-primary": "#a4c9ff",
                    "primary-container": "#2976c7",
                    "outline": "#717783",
                    "on-primary": "#ffffff",
                    "surface-container-low": "#eef4ff",
                    "secondary-container": "#97f0da",
                    "secondary": "#006b5a",
                    "on-secondary-fixed-variant": "#005143",
                    "surface": "#f8f9ff",
                    "on-error": "#ffffff",
                    "surface-container-high": "#dae9ff",
                    "on-tertiary": "#ffffff",
                    "outline-variant": "#c1c7d3",
                    "surface-dim": "#c5dcfb",
                    "inverse-on-surface": "#e9f1ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-gap": "32px",
                    "container-padding": "24px",
                    "button-height-min": "80px",
                    "safe-zone-bottom": "88px",
                    "back-button-tap": "52px",
                    "touch-target-min": "72px"
            },
            "fontFamily": {
                    "body-lg": ["Noto Sans KR"],
                    "headline-lg": ["Noto Sans KR"],
                    "body-md": ["Noto Sans KR"],
                    "label-md": ["Noto Sans KR"],
                    "headline-md": ["Noto Sans KR"]
            },
            "fontSize": {
                    "body-lg": ["28px", {"lineHeight": "48px", "fontWeight": "500"}],
                    "headline-lg": ["40px", {"lineHeight": "60px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["24px", {"lineHeight": "40px", "fontWeight": "400"}],
                    "label-md": ["20px", {"lineHeight": "28px", "letterSpacing": "0.02em", "fontWeight": "700"}],
                    "headline-md": ["36px", {"lineHeight": "54px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "headline-md-mobile": ["32px", {"lineHeight": "48px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-font-smoothing: antialiased; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
            font-size: 32px;
        }
        .step-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .illustration-card { border: 2px solid #97f0da; }
        @keyframes pulse-sensor {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-sensor { animation: pulse-sensor 2s infinite ease-in-out; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen pb-safe-zone-bottom">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-container-padding h-[80px] bg-surface">
<button aria-label="뒤로 가기" class="w-back-button-tap h-back-button-tap flex items-center justify-center active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
<span class="font-label-md text-label-md text-primary ml-1">뒤로</span>
</button>
<div class="flex-1 text-center pr-back-button-tap">
<h1 class="font-headline-md text-headline-md-mobile text-primary tracking-tight">두근두근</h1>
</div>
</header>
<main class="pt-[80px] px-container-padding pb-4 flex flex-col gap-4">
<!-- Header Section -->
<section class="mt-4">
<span class="inline-block bg-primary-container text-on-primary-container px-4 py-1 rounded-lg font-label-md text-label-md mb-4">
                보행 기능 검사
            </span>
<h2 class="font-headline-md text-headline-md-mobile whitespace-pre-line text-on-background">스마트폰을
등쪽 허리에 고정해주세요</h2>
</section>
<!-- Illustration Card -->
<section class="w-full h-[180px] rounded-3xl overflow-hidden illustration-card bg-surface-container-lowest relative flex flex-col items-center justify-center p-4">
<div class="w-full h-full relative">
<img class="w-full h-full object-contain" data-alt="A clean, minimalist 3D illustration of a senior person standing sideways, with a smartphone securely attached to their lower back area with a supportive belt. The lighting is bright and cheerful, using a primary blue and soft mint green color palette. The background is simple and clinical yet warm, suggesting a safe home or clinical environment for health exercises." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBHTCSKbLKtfSG1WKv6bLo0zATh3caQj_RlHMMbvCWrZa-zSP8UG4BF8jDHh_4PkR77GmQeR0UF4ZNBUkY0opiACDNluvcXh8IT4xIDBsdZ8jMJ-WjIZZfVGuropeO_U5PDVIeeegBYTTUiKkTJkWDh3VTINkNKGWvmeD7szPb24gWJmFfFv9zPUaYuZdbKj3GKrKAEOeluDwzi0N0DfCrZjuUdSaNx03T2YxTfwpu1IxExXSoMF87hAvCVabK76A3Axn_kv7Y9dlgT">
</div>
<div class="absolute bottom-4 bg-secondary-container px-6 py-2 rounded-full">
<p class="font-label-md text-label-md text-secondary">허리에 폰을 붙이고 앞으로 걸어요</p>
</div>
</section>
<!-- Status Pill -->
<section class="flex justify-center">
<div class="bg-secondary-container px-8 py-4 rounded-full flex items-center gap-3 animate-sensor shadow-sm">
<span class="material-symbols-outlined text-secondary" data-icon="sensors" style="font-variation-settings: 'FILL' 1;">sensors</span>
<span class="font-headline-md text-[24px] text-secondary font-bold">📡 센서 대기 중...</span>
</div>
</section>
<!-- Instruction Steps -->
<section class="flex flex-col gap-4 bg-white rounded-[2rem] p-8 step-shadow"><div class="flex flex-col gap-4 text-center">
<p class="font-body-lg text-[28px] leading-tight text-on-surface font-bold">
    스마트폰을 허리 뒤쪽 중앙에 고정해주세요
  </p>
<div class="h-px bg-outline-variant opacity-30 w-full"></div>
<p class="font-body-lg text-[28px] leading-tight text-primary">
    준비가 완료되면 안내가 있기 전까지 일자로 걸어주세요
  </p>
</div></section>
<!-- Action Buttons -->
<section class="flex flex-col gap-4 mt-4">
<button class="w-full h-button-height-min bg-primary text-on-primary rounded-2xl flex items-center justify-center gap-4 active:scale-95 transition-all duration-200 shadow-lg" onclick="handleStart()">
<span class="material-symbols-outlined text-white" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-headline-md text-[32px] font-bold">준비됐어요! 측정 시작</span>
</button>
</section>
</main>
<!-- Navigation suppressed for focused task flow (Instructional screen) -->
<script>
        function handleStart() {
            // Visual feedback for interaction
            const btn = event.currentTarget;
            btn.classList.add('bg-on-primary-fixed-variant');
            
            // Interaction logic simulation
            setTimeout(() => {
                alert('측정을 시작합니다. 10초 동안 걸어주세요!');
            }, 200);
        }

        // Haptic-like feedback for all large tap targets
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', () => {
                button.classList.add('opacity-80');
            });
            button.addEventListener('touchend', () => {
                button.classList.remove('opacity-80');
            });
        });
    </script>
</body></html>
