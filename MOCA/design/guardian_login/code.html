<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#2976c7",
                    "primary": "#005da7",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed": "#d4e3ff",
                    "on-error-container": "#93000a",
                    "surface-container-highest": "#d0e4ff",
                    "secondary-fixed-dim": "#7ed7c1",
                    "on-tertiary-fixed": "#3f0300",
                    "error-container": "#ffdad6",
                    "on-tertiary-fixed-variant": "#7d2c1e",
                    "on-secondary": "#ffffff",
                    "on-primary-container": "#fdfcff",
                    "surface-container": "#e4efff",
                    "on-surface": "#021d33",
                    "on-primary": "#ffffff",
                    "tertiary": "#994030",
                    "surface": "#f8f9ff",
                    "primary-fixed-dim": "#a4c9ff",
                    "inverse-on-surface": "#e9f1ff",
                    "secondary-container": "#97f0da",
                    "error": "#ba1a1a",
                    "on-surface-variant": "#414751",
                    "on-error": "#ffffff",
                    "outline": "#717783",
                    "tertiary-fixed": "#ffdad3",
                    "outline-variant": "#c1c7d3",
                    "tertiary-fixed-dim": "#ffb4a6",
                    "secondary-fixed": "#9af3dc",
                    "on-background": "#021d33",
                    "secondary": "#006b5a",
                    "background": "#f8f9ff",
                    "surface-container-low": "#eef4ff",
                    "surface-variant": "#d0e4ff",
                    "on-primary-fixed-variant": "#004883",
                    "surface-bright": "#f8f9ff",
                    "on-primary-fixed": "#001c39",
                    "surface-bright": "#f8f9ff",
                    "inverse-surface": "#1a324a",
                    "on-secondary-container": "#00705e",
                    "on-tertiary-container": "#fffbff",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed-variant": "#005143",
                    "surface-dim": "#c5dcfb",
                    "inverse-primary": "#a4c9ff",
                    "tertiary-container": "#b85846"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "touch-target-min": "72px",
                    "button-height-min": "80px",
                    "stack-gap": "32px",
                    "safe-zone-bottom": "88px",
                    "container-padding": "24px",
                    "back-button-tap": "52px"
            },
            "fontFamily": {
                    "headline-lg": ["Noto Sans KR"],
                    "headline-md": ["Noto Sans KR"],
                    "body-md": ["Noto Sans KR"],
                    "label-md": ["Noto Sans KR"],
                    "body-lg": ["Noto Sans KR"]
            },
            "fontSize": {
                    "headline-lg": ["40px", {"lineHeight": "60px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["36px", {"lineHeight": "54px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-md": ["24px", {"lineHeight": "40px", "fontWeight": "400"}],
                    "label-md": ["20px", {"lineHeight": "28px", "letterSpacing": "0.02em", "fontWeight": "700"}],
                    "body-lg": ["28px", {"lineHeight": "48px", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #F7FAFC;
            overflow: hidden;
            width: 390px;
            height: 844px;
            margin: 0 auto;
            position: relative;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .illustration-bg {
            background: linear-gradient(180deg, #243B53 0%, #4A90E2 100%);
        }
        .squishy-press:active {
            transform: scale(0.96);
            transition: transform 0.1s ease-out;
        }
        .custom-shadow {
            box-shadow: 0 4px 20px rgba(0,0,0,0.10);
        }
        input:focus {
            outline: none;
            border-color: #4A90E2 !important;
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.15);
        }
    </style>
</head>
<body class="flex flex-col">
<!-- Top Illustration Zone -->
<section class="h-[280px] w-full illustration-bg rounded-b-[40px] flex flex-col items-center relative overflow-hidden shrink-0">
<!-- Brand Header -->
<div class="mt-[56px] text-center">
<h1 class="text-[20px] font-bold text-white tracking-[2px]">두근두근</h1>
<p class="text-[14px] text-white opacity-75 mt-1">보호자 · 가족 모드</p>
</div>
<!-- Center Illustration -->
<div class="h-[140px] w-full flex justify-center items-center">
<img class="h-full object-contain" data-alt="A warm and friendly flat design illustration of a 40-year-old adult in a cozy sweater holding a modern smartphone. A vibrant blue glowing heart icon floats gently above the phone screen, symbolizing care and health monitoring. The style is clean, minimalist, and modern, using a professional color palette of blue, soft gray, and white against a gradient background of deep navy and bright blue." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDkfv2tpqdFiwtfgklGmx8aqiy_gwSJNO1MpXq-3pqZdq8wbqlCs6SNKvYO7mMGmNvflqeivPCvQ7R5Esm8P5sAuDhDYfdUc2RjDeQ-o-5pjpwFd7oyt8D5VCaD_tRDurSVVmW582VHF9lLz0vDeTeXeteSOvh5AK9NE_ggqJg_tVmrsQdUWjwqr526zbkfudGRdY_6l9HkeV3Z1rJSvNS4c5pINUqMpEzxNLcbcvOZSu2p8eECdFOoD4EVYcGPkLfuSFxvQtt6qUFZ">
</div>
<!-- Bottom Zone Text -->
<div class="absolute bottom-6 w-full text-center">
<p class="text-[18px] font-bold text-white">부모님의 건강을 함께 지켜요 💙</p>
</div>
</section>
<!-- Login Card Container -->
<main class="px-container-padding flex-1 -mt-[32px] z-10">
<div class="bg-white rounded-[28px] custom-shadow p-[28px_24px] flex flex-col">
<!-- Card Header -->
<header class="mb-8">
<h2 class="text-[22px] font-bold text-[#243B53]">연결 정보 입력</h2>
<p class="text-[14px] text-[#6B7A8D] mt-1">등록된 정보와 일치해야 연결돼요</p>
</header>
<!-- Input Fields Stack -->
<div class="flex flex-col space-y-6">
<!-- Field 1 -->
<div class="space-y-3">
<label class="flex items-center text-[16px] font-bold text-[#243B53]">
<span class="mr-2">부모님 성함</span>
</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-[#6B7A8D] text-[24px]">person</span>
<input class="w-full h-touch-target-min pl-14 pr-6 bg-surface-container-low border-2 border-transparent rounded-xl text-[18px] placeholder:text-outline-variant font-medium transition-all" placeholder="어르신 이름 입력" type="text">
</div>
</div>
<!-- Field 2 -->
<div class="space-y-3">
<div class="flex flex-col">
<label class="text-[16px] font-bold text-[#243B53]">보호자 전화번호</label>
<span class="text-[12px] text-[#6B7A8D]">어르신이 등록한 번호</span>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-[#6B7A8D] text-[24px]">smartphone</span>
<input class="w-full h-touch-target-min pl-14 pr-6 bg-surface-container-low border-2 border-transparent rounded-xl text-[18px] placeholder:text-outline-variant font-medium transition-all" placeholder="010-0000-0000" type="tel">
</div>
</div>
</div>
<!-- Action Button -->
<button class="squishy-press mt-10 w-full h-[56px] bg-[#4A90E2] text-white rounded-full flex items-center justify-center space-x-2 custom-shadow active:shadow-inner transition-all">
<span class="text-[18px] font-bold">부모님 건강 확인하기</span>
<span class="material-symbols-outlined text-[24px]">arrow_forward</span>
</button>
</div>
<!-- Security Notice -->
<div class="mt-8 flex items-center justify-center space-x-2">
<span class="material-symbols-outlined text-[#6B7A8D] text-[18px]">lock</span>
<p class="text-[13px] text-[#6B7A8D]">개인정보 보호정책에 따라 안전하게 처리됩니다</p>
</div>
</main>
<!-- Bottom Navigation Mask (Shell Suppression for Focused Journey) -->
<div class="h-safe-zone-bottom w-full bg-transparent pointer-events-none"></div>
<script>
        // Simple Interaction Feedback
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.02]');
                input.parentElement.parentElement.style.transition = 'all 0.3s ease';
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.02]');
            });
        });

        // Button Animation
        const loginBtn = document.querySelector('button');
        loginBtn.addEventListener('click', function(e) {
            let x = e.clientX - e.target.offsetLeft;
            let y = e.clientY - e.target.offsetTop;
            
            let ripple = document.createElement('span');
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.classList.add('absolute', 'w-2', 'h-2', 'bg-white/30', 'rounded-full', 'animate-ping');
            this.appendChild(ripple);
            
            setTimeout(() => { ripple.remove(); }, 1000);
        });
    </script>
</body></html>
