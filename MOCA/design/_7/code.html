<style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #F7FAFC;
            height: 844px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .score-gradient {
            background: linear-gradient(135deg, #005da7 0%, #00bfa5 100%);
        }
        .chart-container {
            position: relative;
            height: 60px;
            width: 100%;
        }
        .line-chart-svg {
            width: 100%;
            height: 100%;
        }
        .shadow-soft {
            box-shadow: 0 4px 20px rgba(0,0,0,0.10);
        }

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-background">
<!-- TOP HEADER -->
<header class="h-[80px] bg-white flex items-center px-container-padding shadow-sm z-10 shrink-0">
<button aria-label="뒤로가기" class="w-[back-button-tap] h-[back-button-tap] flex items-center justify-center text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[36px]" data-icon="arrow_back">arrow_back</span>
</button>
<div class="ml-4 flex flex-col justify-center">
<h1 class="text-[30px] font-bold text-on-surface leading-tight">상세 리포트</h1>
<span class="text-[18px] text-outline leading-none">1월 17일</span>
</div>
</header>
<!-- CONTENT AREA (Vertical Stack) -->
<main class="flex-1 overflow-hidden px-container-padding pt-6 space-y-6">
<!-- SCORE HERO CARD -->
<section class="score-gradient h-[130px] rounded-[28px] p-6 text-white flex items-center shadow-soft active:scale-[0.98] transition-transform duration-200">
<div class="flex-1 border-r border-white/20">
<p class="text-[18px] opacity-90 mb-1">나의 종합 건강점수</p>
<div class="flex items-baseline gap-3">
<span class="text-[60px] font-black leading-none">82점</span>
<div class="flex text-[#FFD700]">
<span class="material-symbols-outlined text-[24px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[24px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[24px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[24px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[24px]" data-icon="star">star</span>
</div>
</div>
</div>
<div class="pl-6 w-[120px]">
<p class="text-[17px] opacity-90 mb-1">지난주 대비</p>
<p class="text-[32px] font-bold text-white">▲ +7점</p>
</div>
</section>
<!-- SCORE TREND CHART CARD -->
<section class="bg-white h-[130px] rounded-[28px] p-6 shadow-soft flex flex-col justify-between">
<div class="flex justify-between items-center mb-2">
<div class="flex items-center gap-2">
<span class="text-[22px] font-bold text-on-surface">📈 점수 변화</span>
<span class="text-[18px] text-outline">최근 7일</span>
</div>
</div>
<div class="chart-container">
<svg class="line-chart-svg" preserveAspectRatio="none" viewBox="0 0 300 60">
<defs>
<linearGradient id="chartGradient" x1="0" x2="0" y1="0" y2="1">
<stop offset="0%" stop-color="#005da7" stop-opacity="0.2"></stop>
<stop offset="100%" stop-color="#005da7" stop-opacity="0"></stop>
</linearGradient>
</defs>
<!-- Filled area -->
<path d="M0 50 L50 45 L100 48 L150 40 L200 35 L250 25 L300 10 L300 60 L0 60 Z" fill="url(#chartGradient)"></path>
<!-- Line -->
<path d="M0 50 L50 45 L100 48 L150 40 L200 35 L250 25 L300 10" fill="none" stroke="#005da7" stroke-linecap="round" stroke-linejoin="round" stroke-width="4"></path>
<!-- Today Marker -->
<circle cx="300" cy="10" fill="#ba1a1a" r="6"></circle>
</svg>
<div class="absolute right-0 top-[-25px] bg-[#ba1a1a] text-white px-2 py-0.5 rounded-full text-[14px] font-bold">오늘 82</div>
</div>
</section>
<!-- METRIC CARDS ROW -->
<section class="flex gap-4 h-[140px]">
<!-- Card 1: Cognition -->
<div class="flex-1 bg-white rounded-[24px] p-4 shadow-soft flex flex-col justify-between border-b-4 border-primary">

<div>

</div>
</div>

</div>

</div>
<div>

</div>

</div>

<span class="text-[14px] text-outline">출석</span>
</div>
<div class="h-10 w-px bg-outline-variant"></div>
<div class="flex flex-col items-center">

<span class="text-[20px] font-bold text-on-surface">4일</span>
<span class="text-[14px] text-outline">연속</span>
</div>
<div class="h-10 w-px bg-outline-variant"></div>
<div class="flex flex-col items-center">
<span class="text-[24px] mb-1">🏅</span>
<span class="text-[20px] font-bold text-on-surface">4개</span>

<span class="material-symbols-outlined text-[32px]" data-icon="home">home</span>
<span class="font-label-md text-label-md mt-1">홈</span>
</a>

<span class="material-symbols-outlined text-[32px]" data-icon="edit_square" style="font-variation-settings: 'FILL' 1;">edit_square</span>
<span class="font-label-md text-label-md mt-1">기록</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined text-[32px]" data-icon="bar_chart">bar_chart</span>
<span class="font-label-md text-label-md mt-1">통계</span>
</a>

<span class="material-symbols-outlined text-[32px]" data-icon="person">person</span>
<span class="font-label-md text-label-md mt-1">내 정보</span>
</a>
</nav>
<script>
        // Micro-interaction for back button
        document.querySelector('button[aria-label="뒤로가기"]').addEventListener('click', () => {
            window.history.back();
        });

        // Simple animation on load for cards
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('section');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                card.style.transition = 'opacity 0.5s ease-out, transform 0.5s ease-out';
                card.style.transitionDelay = `${index * 0.1}s`;
                
                setTimeout(() => {
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 50);
            });
        });
    </script>
</body></html>
