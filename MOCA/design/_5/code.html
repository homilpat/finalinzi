<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .balloon {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .balloon:active {
            transform: scale(0.8);
        }
        .balloon-pop {
            animation: pop 0.3s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; pointer-events: none; }
        }
        .sky-gradient {
            background: linear-gradient(to bottom, #EBF4FF 0%, #F7FAFC 100%);
        }
        /* Custom shape for teardrop balloon */
        .teardrop {
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            position: relative;
        }
        .teardrop::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 10px solid currentColor;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#1a324a",
                        "on-tertiary-fixed-variant": "#7d2c1e",
                        "on-primary-fixed": "#001c39",
                        "on-tertiary-container": "#fffbff",
                        "error-container": "#ffdad6",
                        "tertiary": "#994030",
                        "primary": "#005da7",
                        "on-primary-fixed-variant": "#004883",
                        "on-secondary-fixed": "#00201a",
                        "surface-variant": "#d0e4ff",
                        "on-error-container": "#93000a",
                        "surface-tint": "#0060ac",
                        "primary-fixed-dim": "#a4c9ff",
                        "on-secondary-container": "#00705e",
                        "tertiary-fixed-dim": "#ffb4a6",
                        "secondary-fixed": "#9af3dc",
                        "on-surface-variant": "#414751",
                        "on-background": "#021d33",
                        "tertiary-fixed": "#ffdad3",
                        "surface-container-highest": "#d0e4ff",
                        "on-primary-container": "#fdfcff",
                        "background": "#f8f9ff",
                        "secondary-fixed-dim": "#7ed7c1",
                        "primary-fixed": "#d4e3ff",
                        "error": "#ba1a1a",
                        "surface-bright": "#f8f9ff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#e4efff",
                        "on-surface": "#021d33",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#b85846",
                        "on-tertiary-fixed": "#3f0300",
                        "inverse-primary": "#a4c9ff",
                        "primary-container": "#2976c7",
                        "outline": "#717783",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#eef4ff",
                        "secondary-container": "#97f0da",
                        "secondary": "#006b5a",
                        "on-secondary-fixed-variant": "#005143",
                        "surface": "#f8f9ff",
                        "on-error": "#ffffff",
                        "surface-container-high": "#dae9ff",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#c1c7d3",
                        "surface-dim": "#c5dcfb",
                        "inverse-on-surface": "#e9f1ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap": "32px",
                        "container-padding": "24px",
                        "button-height-min": "80px",
                        "safe-zone-bottom": "88px",
                        "back-button-tap": "52px",
                        "touch-target-min": "72px"
                    },
                    "fontFamily": {
                        "body-lg": ["Noto Sans KR"],
                        "headline-lg": ["Noto Sans KR"],
                        "body-md": ["Noto Sans KR"],
                        "label-md": ["Noto Sans KR"],
                        "headline-md": ["Noto Sans KR"]
                    },
                    "fontSize": {
                        "body-lg": ["28px", {"lineHeight": "48px", "fontWeight": "500"}],
                        "headline-lg": ["40px", {"lineHeight": "60px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["24px", {"lineHeight": "40px", "fontWeight": "400"}],
                        "label-md": ["20px", {"lineHeight": "28px", "letterSpacing": "0.02em", "fontWeight": "700"}],
                        "headline-md": ["36px", {"lineHeight": "54px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center">
<!-- Top App Bar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-container-padding h-[80px] bg-surface">
<button aria-label="뒤로 가기" class="w-[back-button-tap] h-[back-button-tap] flex items-center justify-center active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary text-[32px]">arrow_back</span>
<span class="ml-1 font-label-md text-label-md text-primary">뒤로</span>
</button>
<h1 class="flex-1 text-center font-headline-md text-[24px] text-primary pr-[back-button-tap]">두근두근</h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md mx-auto pt-[80px] pb-safe-zone-bottom px-container-padding flex flex-col sky-gradient">
<!-- Badge Section -->
<div class="mt-6 flex justify-center">
<span class="bg-primary-container text-on-primary-container px-6 py-2 rounded-full font-label-md text-label-md">
                인지 기능 검사
            </span>
</div>
<!-- Headline -->
<h2 class="mt-4 font-headline-md text-headline-md text-center text-on-surface whitespace-pre-line">
            풍선을 순서대로
            터트려주세요!
        </h2>
<!-- Timer Section -->
<div class="mt-8 flex flex-col items-center justify-center h-[120px]">
<div class="w-[80px] h-[80px] rounded-full flex items-center justify-center bg-[#FF8F7A] shadow-lg border-4 border-white">
<span class="text-[48px] font-bold text-white tracking-tighter" id="timer-val">26</span>
</div>
<p class="mt-2 font-body-md text-[#FF8F7A] font-bold">초 남았어요</p>
</div>
<!-- Instruction Card -->
<div class="mt-6 w-full h-[80px] bg-secondary-container rounded-2xl flex items-center justify-center shadow-sm border-2 border-secondary">
<p class="font-headline-md text-[24px] text-secondary font-bold">
                💡 1번 풍선부터 차례로 터트려요!
            </p>
</div>
<!-- Game Area Card -->
<div class="mt-8 w-full h-[320px] bg-surface-container-lowest rounded-[28px] relative shadow-[0_4px_20px_rgba(0,0,0,0.10)] overflow-hidden border-2 border-outline-variant/30">
<!-- Balloons Container -->
<div class="w-full h-full relative p-6" id="game-canvas">
<!-- Balloon 1: Coral -->
<button class="balloon teardrop absolute w-[90px] h-[110px] text-[#FF8F7A] flex items-center justify-center top-[10%] left-[5%]" onclick="popBalloon(this, 1)" style="color: #FF8F7A;">
<span class="relative z-10 text-white font-bold text-[40px] mt-[-10px]">1</span>
<div class="absolute inset-0 bg-current rounded-[50%_50%_50%_50%_/_40%_40%_60%_60%] shadow-md opacity-90"></div>
</button>
<!-- Balloon 2: Blue -->
<button class="balloon teardrop absolute w-[90px] h-[110px] text-primary flex items-center justify-center top-[45%] left-[30%]" onclick="popBalloon(this, 2)" style="color: #005da7;">
<span class="relative z-10 text-white font-bold text-[40px] mt-[-10px]">2</span>
<div class="absolute inset-0 bg-current rounded-[50%_50%_50%_50%_/_40%_40%_60%_60%] shadow-md opacity-90"></div>
</button>
<!-- Balloon 3: Mint -->
<button class="balloon teardrop absolute w-[90px] h-[110px] text-secondary flex items-center justify-center top-[15%] right-[10%]" onclick="popBalloon(this, 3)" style="color: #006b5a;">
<span class="relative z-10 text-white font-bold text-[40px] mt-[-10px]">3</span>
<div class="absolute inset-0 bg-current rounded-[50%_50%_50%_50%_/_40%_40%_60%_60%] shadow-md opacity-90"></div>
</button>
<!-- Balloon 4: Amber -->
<button class="balloon teardrop absolute w-[90px] h-[110px] text-orange-400 flex items-center justify-center bottom-[10%] right-[15%]" onclick="popBalloon(this, 4)" style="color: #fbbf24;">
<span class="relative z-10 text-white font-bold text-[40px] mt-[-10px]">4</span>
<div class="absolute inset-0 bg-current rounded-[50%_50%_50%_50%_/_40%_40%_60%_60%] shadow-md opacity-90"></div>
</button>
<!-- Balloon 5: Purple -->
<button class="balloon teardrop absolute w-[90px] h-[110px] text-purple-500 flex items-center justify-center bottom-[15%] left-[10%]" onclick="popBalloon(this, 5)" style="color: #a855f7;">
<span class="relative z-10 text-white font-bold text-[40px] mt-[-10px]">5</span>
<div class="absolute inset-0 bg-current rounded-[50%_50%_50%_50%_/_40%_40%_60%_60%] shadow-md opacity-90"></div>
</button>
</div>
</div>
<!-- Reset Button -->
<div class="mt-auto pt-8 pb-4">
<button class="w-full h-[64px] border-2 border-primary rounded-2xl flex items-center justify-center gap-2 active:scale-95 transition-all text-primary hover:bg-primary/5" onclick="resetGame()">
<span class="material-symbols-outlined text-[28px]">refresh</span>
<span class="font-headline-md text-[24px]">다시 시작하기</span>
</button>
</div>
</main>
<!-- Bottom Navigation Bar (Active: None since this is a task-focused task) -->
<!-- Suppressed per "Task-Focused" rule -->
<script>
        let currentSequence = 1;
        let timer = 28;
        let timerInterval;

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(timer > 0) {
                    timer--;
                    document.getElementById('timer-val').innerText = timer;
                } else {
                    clearInterval(timerInterval);
                    alert("시간이 종료되었습니다! 다시 시도해보세요.");
                    resetGame();
                }
            }, 1000);
        }

        function popBalloon(element, number) {
            if (number === currentSequence) {
                element.classList.add('balloon-pop');
                currentSequence++;
                
                // Success feedback
                const feedback = document.createElement('div');
                feedback.className = "fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none text-primary font-bold text-6xl opacity-0 transition-opacity";
                feedback.innerText = "잘하셨어요!";
                document.body.appendChild(feedback);
                
                setTimeout(() => {
                    feedback.style.opacity = "1";
                    setTimeout(() => feedback.remove(), 500);
                }, 50);

                if (currentSequence > 5) {
                    clearInterval(timerInterval);
                    setTimeout(() => {
                        alert("참 잘하셨습니다! 모든 풍선을 터트렸어요.");
                    }, 500);
                }
            } else {
                // Shake effect for wrong sequence
                element.classList.add('animate-bounce');
                setTimeout(() => element.classList.remove('animate-bounce'), 500);
            }
        }

        function resetGame() {
            currentSequence = 1;
            timer = 28;
            document.getElementById('timer-val').innerText = timer;
            
            const balloons = document.querySelectorAll('.balloon');
            balloons.forEach(b => {
                b.classList.remove('balloon-pop');
                b.style.pointerEvents = 'auto';
            });
            
            startTimer();
        }

        window.onload = startTimer;
    </script>
</body></html>
